name: synapse-d

services:
  # FastAPI Backend
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../src:/app/src
      - ../vendor:/app/vendor:ro
    environment:
      - SYNAPSE_DATA_DIR=/app/data
      - SYNAPSE_DEVICE=${SYNAPSE_DEVICE:-cpu}
      - SYNAPSE_CORS_ORIGINS=["http://localhost:3000"]
      - SYNAPSE_CELERY_BROKER_URL=redis://redis:6379/0
      - SYNAPSE_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SYNAPSE_TVB_WORKER_URL=http://tvb:8001
    depends_on:
      - redis

  # Celery Worker (CPU — Mac Silicon / x86 compatible)
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A synapse_d.api.tasks:celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ../data:/app/data
      - ../src:/app/src
      - ../vendor:/app/vendor:ro
    environment:
      - SYNAPSE_DEVICE=cpu
      - SYNAPSE_CELERY_BROKER_URL=redis://redis:6379/0
      - SYNAPSE_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SYNAPSE_TVB_WORKER_URL=http://tvb:8001
    depends_on:
      - redis

  # Celery Worker (GPU — Linux + NVIDIA only)
  # Usage: docker compose --profile gpu up
  worker-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    command: celery -A synapse_d.api.tasks:celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ../data:/app/data
      - ../src:/app/src
      - ../vendor:/app/vendor:ro
    environment:
      - SYNAPSE_DEVICE=cuda
      - SYNAPSE_CELERY_BROKER_URL=redis://redis:6379/0
      - SYNAPSE_CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["gpu"]

  # TVB Brain Simulation Worker (GPLv3 — intentionally isolated)
  # Runs TVB in a separate container to prevent GPL contamination.
  # Communication: REST API only (POST /simulate)
  tvb:
    build:
      context: ../tvb_worker
      dockerfile: Dockerfile
    # Internal only — accessed by worker via Docker network, not exposed to host
    # For local dev testing: uncomment ports below
    # ports:
    #   - "8001:8001"
    expose:
      - "8001"

  # Redis (message broker + result backend for Celery job state)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  redis_data:
